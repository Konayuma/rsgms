services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rsgms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postpass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seed_test_data.pgsql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_DRIVER: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: rsgms_db
      DB_USER: postgres
      DB_PASSWORD: postpass
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
